<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PORTFOLIO</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    /* ===== RESET ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; overflow-x: hidden; font-family: 'Montserrat', sans-serif; }

    /* ===== FIXED BACKGROUND VIDEO ===== */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      display: block;
      object-fit: cover;
      object-position: center;
      background: #000;
      pointer-events: none;
      will-change: contents;
    }

    /* ===== LOADING INDICATOR ===== */
    #loading-indicator {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 10px 14px; border-radius: 6px;
      font-size: 11px; font-family: monospace;
      z-index: 9999; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #loading-indicator.done { opacity: 0; }

    /* ===== CONTENT LAYER ===== */
    #root { position: relative; z-index: 1; }

    /* ===== LIQUID GLASS CARD ===== */
    .liquid-glass {
      background: rgba(15,15,15,0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
    }

    /* ===== HAMBURGER MENU ===== */
    .menu-icon {
      position: fixed; top: 30px; right: 40px;
      width: 60px; height: 60px; cursor: pointer;
      z-index: 100; opacity: 0;
    }
    .nav-capsule {
      position: fixed; top: 30px; right: 40px; z-index: 90;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      padding: 0; border-radius: 50px; overflow: visible;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12),
                  inset 0 -1px 0 rgba(255,255,255,0.03),
                  0 8px 30px rgba(0,0,0,0.4);
      height: 60px; max-width: 60px;
      transition: max-width 0.6s cubic-bezier(0.23,1,0.32,1),
                  background 0.5s ease, box-shadow 0.5s ease;
    }
    .hamburger-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 2;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .hamburger-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
    .hamburger-lines { display: flex; flex-direction: column; gap: 5px; width: 18px; }
    .hamburger-lines span {
      display: block; height: 2px; width: 100%;
      background: rgba(255,255,255,0.7); border-radius: 2px;
      transition: transform 0.4s cubic-bezier(0.23,1,0.32,1),
                  opacity 0.3s ease, background 0.3s ease;
    }
    .hamburger-btn:hover .hamburger-lines span { background: #fff; }
    .menu-icon:checked ~ .nav-capsule .hamburger-lines span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: #fff; }
    .menu-icon:checked ~ .nav-capsule .hamburger-lines span:nth-child(2) { opacity: 0; }
    .menu-icon:checked ~ .nav-capsule .hamburger-lines span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: #fff; }
    .nav-capsule-menu {
      margin: 0; padding: 0 70px 0 12px;
      display: flex; justify-content: center; align-items: center;
      max-width: 0; overflow: hidden; white-space: nowrap; gap: 24px;
      opacity: 0;
      transition: max-width 0.6s cubic-bezier(0.23,1,0.32,1),
                  opacity 0.4s ease 0.1s,
                  padding 0.6s cubic-bezier(0.23,1,0.32,1);
    }
    .menu-icon:checked ~ .nav-capsule .nav-capsule-menu {
      max-width: 600px; opacity: 1;
      transition: max-width 0.6s cubic-bezier(0.23,1,0.32,1),
                  opacity 0.4s ease,
                  padding 0.6s cubic-bezier(0.23,1,0.32,1);
    }
    .nav-capsule-menu li { list-style: none; margin: 0; flex-shrink: 0; }
    .nav-capsule-menu li a {
      text-decoration: none; color: rgba(255,255,255,0.6);
      font-family: 'Montserrat', sans-serif; font-size: 11px;
      text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
      transition: all 0.3s ease; position: relative;
    }
    .nav-capsule-menu li a:hover { color: #fff; }
    .nav-capsule-menu li a::after {
      display: block; position: absolute; top: 50%; content: '';
      height: 2px; margin-top: -1px; width: 0; left: 0;
      background: rgba(255,255,255,0.5); transition: width 300ms ease;
    }
    .nav-capsule-menu li a:hover::after { width: 100%; }
    .menu-icon:checked ~ .nav-capsule {
      max-width: 680px; background: rgba(255,255,255,0.045);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12),
                  inset 0 -1px 0 rgba(255,255,255,0.03),
                  0 10px 40px rgba(0,0,0,0.5);
    }

    /* Logo */
    .logo {
      position: fixed; top: 35px; left: 45px;
      display: block; z-index: 100; transition: all 250ms linear; cursor: pointer;
    }
    .logo-text {
      font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
      font-size: 26px; letter-spacing: 2px;
      background: linear-gradient(135deg, #ffffff, #a0a0ff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    /* ===== FLIP CARD ===== */
    .flip-card { background-color: transparent; width: 100%; perspective: 1600px; position: relative; }
    .flip-card-inner {
      position: relative; width: 100%;
      transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
      transform-style: preserve-3d; border-radius: 2rem;
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back {
      position: absolute; top: 0; left: 0; width: 100%; min-height: 100%;
      backface-visibility: hidden; border-radius: 2rem; overflow: hidden;
    }
    .flip-card-front {
      background: rgba(15,15,15,0.35); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08); transform: rotateY(0deg); position: relative;
    }
    .flip-card-back {
      background: rgba(15,15,15,0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      transform: rotateY(180deg); border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
      overflow-y: auto; scrollbar-width: thin;
    }
    .flip-card.flipped .flip-card-front { visibility: hidden; opacity: 0; }
    .flip-card.flipped .flip-card-back { visibility: visible; opacity: 1; }
    .flip-card:not(.flipped) .flip-card-back { visibility: hidden; opacity: 0; }
    .flip-card:not(.flipped) .flip-card-front { visibility: visible; opacity: 1; }
    .flip-card-back::-webkit-scrollbar { width: 4px; }
    .flip-card-back::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .flip-card-back::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 10px; }
    .flip-card-container { height: auto; display: flex; }
    .workflow-step { transition: all 0.2s ease; }
    .workflow-step:hover { transform: translateX(4px); }

    /* ===== SCROLL ANIMATIONS — GPU-OPTIMIZED ===== */
    /* Start state: hidden. GSAP tweens to visible. */
    /* Using transform+opacity only — no layout-triggering properties */
    .sa {                    /* base: fade + slide up */
      opacity: 0;
      transform: translateY(48px);
      will-change: transform, opacity;
    }
    .sa-left {              /* slide from left */
      opacity: 0;
      transform: translateX(-60px);
      will-change: transform, opacity;
    }
    .sa-right {             /* slide from right */
      opacity: 0;
      transform: translateX(60px);
      will-change: transform, opacity;
    }
    .sa-scale {             /* scale up */
      opacity: 0;
      transform: scale(0.9);
      will-change: transform, opacity;
    }
    /* When GSAP adds this class, element is visible */
    .sa-done {
      opacity: 1;
      transform: none;
    }

    /* ===== SCROLL DOWN SIGN ===== */
    .scroll-indicator-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translate(-50%, 20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1), transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }
    
    .scroll-indicator-container.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .scroll-indicator-mouse {
      width: 22px;
      height: 36px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      padding-top: 6px;
    }

    .scroll-indicator-dot {
      width: 4px;
      height: 7px;
      background-color: #fff;
      border-radius: 50%;
      animation: scroll-wheel-anim 1.8s ease-in-out infinite;
    }

    @keyframes scroll-wheel-anim {
      0% {
        opacity: 0;
        transform: translateY(-3px);
      }
      20% {
        opacity: 1;
      }
      60% {
        opacity: 1;
        transform: translateY(6px);
      }
      100% {
        opacity: 0;
        transform: translateY(10px);
      }
    }

    .scroll-indicator-text {
      font-family: 'Barlow', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin-left: 3px;
    }

    /* ===== RESPONSIVE ===== */
    @media screen and (max-width: 768px) {
      .nav-capsule { top: 20px; right: 16px; }
      .menu-icon { top: 20px; right: 16px; }
      .nav-capsule-menu { gap: 14px; padding: 0 62px 0 8px; }
      .nav-capsule-menu li a { font-size: 9px; letter-spacing: 1px; }
      .logo { top: 25px; left: 20px; }
      .logo-text { font-size: 18px; }
    }
  </style>
</head>

<body>
  <video id="bg-video" muted playsinline preload="metadata"></video>
  <div id="loading-indicator">Loading video...</div>
  <div id="root"></div>

  <script type="text/babel">
    // ============================================================
    //  PERFECTED VIDEO + SCROLL SYSTEM
    // ============================================================
    //  VIDEO: scrub: 0.08 (tight but smooth), debounced seek,
    //         only seeks when delta > 1 frame, no wasted calls.
    //  ANIMATIONS: batch-processed, one trigger per section,
    //              transform+opacity only, will-change GPU hints,
    //              minimal ScrollTriggers, no rotateX/3D.
    // ============================================================

    // ===== VIDEO SCROLL MANAGER =====
    // Smooth, high-fps, reverse works, works at boundaries, no teleporting
    class VideoScrollManager {
      constructor() {
        this.video = document.getElementById('bg-video');
        this.indicator = document.getElementById('loading-indicator');
        if (!this.video) return;

        this.duration = 0;
        this.ready = false;
        this.rafId = null;
        // smoothTime is driven by RAF, not GSAP — we lerp manually
        this.smoothTime = 0;
        this.lastSetTime = -1; // Track the last time set to avoid redundant updates
        this.lastSeekTime = 0; // Track time of last seek to throttle requests

        this.video.src = 'MV1.mp4';
        this.video.muted = true;
        this.video.playsinline = true;
        this.video.preload = 'auto';

        this.updateStatus('Loading video...');

        this.video.addEventListener('loadedmetadata', () => {
          this.duration = this.video.duration;
          this.video.currentTime = 0;
          if (isFinite(this.duration) && this.duration > 0) {
            this.ready = true;
            this.startLoop();
            this.updateStatus('Video ready');
            setTimeout(() => {
              if (this.indicator) this.indicator.classList.add('done');
            }, 400);
          }
        });

        this.video.addEventListener('error', () => {
          this.updateStatus('Video failed to load');
        });

        this.video.load();
      }

      updateStatus(msg) {
        if (this.indicator) this.indicator.textContent = msg;
      }

      /*
       * RAF loop — runs every frame at display refresh rate.
       * 1. Read scroll position → compute target time
       * 2. Lerp smoothTime toward target (15% per frame = smooth inertia catch-up)
       * 3. Snap when close (< 10ms) to avoid asymptotic drift
       * 4. Apply safeTime with 15ms boundary margin to prevent decoder lockup
       * 5. Set video.currentTime only if it's changed by >1ms, throttling seek updates to ~60fps (16.7ms)
       *    to prevent decoder queue clogging, but allowing immediate snap seeks when scroll stops.
       */
      startLoop() {
        const margin = 0.015; // 15ms margin at each end

        const loop = () => {
          if (this.ready && this.duration > 0) {
            // Target from scroll position
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            const scrollY = Math.max(0, Math.min(window.scrollY, maxScroll));
            const targetTime = maxScroll > 0 ? (scrollY / maxScroll) * this.duration : 0;

            // Lerp toward target (15% per frame creates a smooth, fluid feel)
            const diff = targetTime - this.smoothTime;
            const isClosing = Math.abs(diff) < 0.01;
            if (!isClosing) {
              this.smoothTime += diff * 0.15; 
            } else {
              this.smoothTime = targetTime; // snap when close
            }

            // Apply with boundary margin
            const progress = this.smoothTime / this.duration;
            const safeTime = margin + progress * (this.duration - margin * 2);

            const now = performance.now();
            const timeDiff = now - this.lastSeekTime;
            const valueDiff = Math.abs(safeTime - this.lastSetTime);

            // Throttle & De-duplicate updates:
            // 1. Only write if safeTime has changed by more than 1ms (0.001s).
            // 2. Only write if at least 16.67ms (60 FPS seek limit) has passed OR
            //    we are close to snapping to the final position (ensures perfect alignment on stop).
            if (valueDiff > 0.001) {
              if (timeDiff > 16.67 || isClosing) {
                this.video.currentTime = safeTime;
                this.lastSetTime = safeTime;
                this.lastSeekTime = now;
              }
            }
          }
          this.rafId = requestAnimationFrame(loop);
        };
        this.rafId = requestAnimationFrame(loop);
      }
    }

    // Init video immediately
    const vm = new VideoScrollManager();
    window.videoManager = vm;

    // ============================================================
    //  BATCH SCROLL ANIMATION SYSTEM — HIGH PERFORMANCE
    // ============================================================
    //  Instead of creating one ScrollTrigger per element (expensive),
    //  we use ONE trigger per section and batch-animate children.
    //  Only transform + opacity — no layout recalculation.
    //  GPU-composited via will-change.
    // ============================================================

    function initAnimations() {
      gsap.registerPlugin(ScrollTrigger);

      // Kill old non-body triggers (video body trigger is preserved)
      ScrollTrigger.getAll().forEach(t => {
        if (t.trigger !== document.body && t.vars && t.vars.trigger !== document.body) {
          t.kill();
        }
      });

      /*
       * Core batch animator: one trigger per section, animates all
       * .sa, .sa-left, .sa-right, .sa-scale children in a single call.
       * toggleActions: play on enter, reverse on leave (both directions)
       */
      function animateSection(sectionSelector, options = {}) {
        const section = document.querySelector(sectionSelector);
        if (!section) return;

        const {
          stagger = 0.12,
          duration = 0.8,
          ease = 'power2.out',
          start = 'top 82%',
        } = options;

        // Find all animatable children (including headings, cards, and sub-elements)
        const targets = section.querySelectorAll('.sa-heading, .sa, .sa-left, .sa-right, .sa-scale');
        if (!targets.length) return;

        // Use a grid-based stagger configuration so elements in the same row (like side-by-side cards) animate together
        const staggerConfig = {
          each: stagger,
          grid: 'auto',
          from: 'start'
        };

        // Single gsap.fromTo with stagger — ONE ScrollTrigger total for the entire section
        gsap.fromTo(targets, {
          opacity: 0,
          y: (i, el) => {
            if (el.classList.contains('sa-heading')) return 40;
            if (el.classList.contains('sa')) return 48;
            return 0;
          },
          x: (i, el) => {
            if (el.classList.contains('sa-left')) return -60;
            if (el.classList.contains('sa-right')) return 60;
            return 0;
          },
          scale: (i, el) => {
            if (el.classList.contains('sa-scale')) return 0.95;
            return 1;
          }
        }, {
          opacity: 1,
          y: 0,
          x: 0,
          scale: 1,
          duration,
          ease,
          stagger: staggerConfig,
          scrollTrigger: {
            trigger: section,
            start,
            toggleActions: 'play none none reverse',
          }
        });
      }

      // Animate each section — everything (headings + cards) cascades together in a single stagger trigger
      animateSection('#capabilities', { stagger: 0.15, duration: 0.8 });
      animateSection('#skills', { stagger: 0.12, duration: 0.7 });
      animateSection('#projects', { stagger: 0.15, duration: 0.8 });
      animateSection('#contact', { stagger: 0.12, duration: 0.7 });

      // Workflow steps — only when flip card is visible
      document.querySelectorAll('.workflow-step').forEach((el, i) => {
        gsap.fromTo(el,
          { opacity: 0, x: -30 },
          {
            opacity: 1, x: 0,
            duration: 0.4,
            delay: i * 0.06,
            ease: 'power2.out',
            scrollTrigger: {
              trigger: el.closest('.flip-card-back') || el,
              start: 'top 90%',
              toggleActions: 'play none none reverse',
            }
          }
        );
      });

      ScrollTrigger.refresh();
    }

    // Run once after React mounts — debounced
    let animTimer = null;
    const rootEl = document.getElementById('root');
    if (rootEl) {
      const obs = new MutationObserver(() => {
        clearTimeout(animTimer);
        animTimer = setTimeout(initAnimations, 200);
      });
      obs.observe(rootEl, { childList: true, subtree: true });
    }
    window.addEventListener('load', () => {
      clearTimeout(animTimer);
      animTimer = setTimeout(initAnimations, 400);
    });

    // ===== ICONS =====
    const ArrowUpRight = ({ className = "h-5 w-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M7 17L17 7" /><path d="M7 7h10v10" />
      </svg>
    );
    const WorkflowIcon = ({ className = "h-4 w-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
        <circle cx="12" cy="12" r="3" />
      </svg>
    );
    const CloseIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    );

    // ===== HAMBURGER MENU =====
    const HamburgerMenu = () => {
      const handleMenuClick = (e, sectionId) => {
        e.preventDefault(); e.stopPropagation();
        const cb = document.getElementById('menu-icon');
        if (cb) cb.checked = false;
        if (sectionId === 'home') {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setTimeout(() => {
            const el = document.getElementById(sectionId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        }
      };
      const handleCapsuleClick = (e) => {
        if (e.target.tagName === 'A' || e.target.closest('a')) return;
        const cb = document.getElementById('menu-icon');
        if (cb) cb.checked = !cb.checked;
      };
      const menuItems = [
        { name: "Home", sectionId: "home" },
        { name: "About", sectionId: "capabilities" },
        { name: "Skills", sectionId: "skills" },
        { name: "Projects", sectionId: "projects" },
        { name: "Contact", sectionId: "contact" }
      ];
      return (
        <>
          <input className="menu-icon" type="checkbox" id="menu-icon" name="menu-icon" />
          <div className="nav-capsule" onClick={handleCapsuleClick}>
            <div className="hamburger-btn">
              <div className="hamburger-lines"><span></span><span></span><span></span></div>
            </div>
            <ul className="nav-capsule-menu">
              {menuItems.map((item, idx) => (
                <li key={idx}>
                  <a href={`#${item.sectionId}`} onClick={(e) => handleMenuClick(e, item.sectionId)}>{item.name}</a>
                </li>
              ))}
            </ul>
          </div>
          <div className="logo" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
            <div className="logo-text">Portfolio</div>
          </div>
        </>
      );
    };

    // ===== HERO SECTION =====
    const Hero = () => {
      const [visible, setVisible] = React.useState(false);

      React.useEffect(() => {
        // Entrance animation on page load
        gsap.fromTo('.hero-text-line',
          { opacity: 0, y: 120 },
          { opacity: 1, y: 0, duration: 1.4, ease: 'power4.out', stagger: 0.2 }
        );

        // Scroll out (fade + slide up) and scroll back in animation
        gsap.to('.hero-text-line', {
          y: -100,
          opacity: 0,
          stagger: 0.08,
          scrollTrigger: {
            trigger: '#home',
            start: 'top top',
            end: 'bottom 30%',
            scrub: true,
          }
        });

        // Hide scroll indicator if already scrolled down on mount
        if (window.scrollY > 50) {
          return;
        }
